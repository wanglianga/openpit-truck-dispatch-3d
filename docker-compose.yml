services:
  openpit-dispatch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openpit-dispatch-3d
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openpit-net

networks:
  openpit-net:
    driver: bridge
